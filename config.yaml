# SearchFund Auto-Outreach (SFAO) Configuration

# ─── Email Settings ────────────────────────────────────────────────────────────
email:
  daily_send_cap: 15
  send_window_hour: 9          # 9 AM local time
  delay_between_sends_min: 30  # seconds
  delay_between_sends_max: 90  # seconds

# ─── Follow-up Rules ───────────────────────────────────────────────────────────
followup:
  followup_1_days: 7
  followup_2_days: 7
  max_followups: 2

# ─── Scheduler (cron expressions) ─────────────────────────────────────────────
scheduler:
  discovery_cron: "0 3 * * *"   # 3 AM daily
  send_cron: "0 9 * * *"        # 9 AM daily
  followup_cron: "0 10 * * *"   # 10 AM daily
  response_poll_cron: "0 */4 * * *"  # every 4 hours

# ─── Seed Source URLs ──────────────────────────────────────────────────────────
source_urls:
  - name: "Smash.vc Search Fund Investors"
    url: "https://smash.vc/search-fund-investors/"
    type: "investor_directory"
  - name: "Searchfunder Top Investors"
    url: "https://searchfunder.com/post/top-20-search-fund-investors-so-far"
    type: "investor_directory"
  - name: "Anacapa Partners Portfolio"
    url: "https://anacapapartners.com/portfolio"
    type: "investor_directory"
  - name: "Relay Investments Portfolio"
    url: "https://www.relayinvestments.com/entrepreneurs"
    type: "investor_directory"
  - name: "Broadtree Partners Entrepreneurs"
    url: "https://www.broadtreepartners.com/entrepreneurs"
    type: "investor_directory"

# ─── Ishaan's Bio (used in template rendering) ─────────────────────────────────
sender:
  name: "Ishaan Joshi"
  sign_off: "Best,"
  bio_line: |
    I spent the last few years co-founding two B2B SaaS startups, InstaTrain ($100k pre-seed) 
    and Luminerra, and was selected as a Morgan Stanley Scholar. I'm trying to apply that 
    operator mindset to investing, particularly at the intersection of technology and ETA.
  intro_line: |
    I am a high school senior in Chester County and an incoming freshman at UT Austin ECE (ECB) 
    and Canfield Business Honors (25-student cohort).

